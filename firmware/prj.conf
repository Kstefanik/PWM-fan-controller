# --- Hardware Support ---
CONFIG_PWM=y
CONFIG_PWM_CAPTURE=y
CONFIG_I2C=y
CONFIG_I2C_STM32_V2_TIMING=y
CONFIG_ADC=y
CONFIG_SENSOR=y
CONFIG_JC42=y
CONFIG_FPU=y

# --- Floating Point & Printf Support ---
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- RTOS & Message Bus ---
CONFIG_ZBUS=y
CONFIG_EVENTS=y
CONFIG_CLOCK_CONTROL=y
CONFIG_POLL=y

# --- USB Device Stack ---
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USB_MGR_STACK_SIZE=2048

# --- USB-C Stack ---
# CONFIG_USBC_STACK=y
# CONFIG_USBC_THREAD_PRIORITY=10
# CONFIG_USBC_CSM_SINK_ONLY=y

# --- USB CDC ACM Serial Console ---
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_STDOUT_CONSOLE=y

# --- Logging (Base Configuration) ---
CONFIG_LOG=y
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_ERR=y