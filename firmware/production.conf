# --- Compiler & Linker Optimizations ---
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n

# --- Strip Debugging Overhead ---
CONFIG_DEBUG=n
CONFIG_DEBUG_INFO=n
CONFIG_DEBUG_THREAD_INFO=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_NAME=n
CONFIG_THREAD_RUNTIME_STATS=n

# --- Logging ---
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_SEGGER_RTT_SECTION_NONE=y
CONFIG_ZBUS_LOG_LEVEL_INF=y
CONFIG_LOG_MODE_DEFERRED=y

# --- Safety & Hardening ---
CONFIG_ASSERT=n
CONFIG_FORTIFY_SOURCE_COMPILE_TIME=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_MPU_STACK_GUARD=y